<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bot DAS-SIMEI — Tesserato Contabilidade</title>
  <style>
    :root {
      --azul:    #1a3a6b;
      --teal:    #00b4b4;
      --teal2:   #0090c0;
      --branco:  #ffffff;
      --cinza1:  #f4f6f9;
      --cinza2:  #e8ecf0;
      --cinza3:  #b0bec5;
      --texto:   #2d3748;
      --verde:   #38a169;
      --vermelho:#e53e3e;
      --laranja: #dd6b20;
      --sombra:  0 2px 12px rgba(0,0,0,.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--cinza1); color: var(--texto); }

    /* HEADER */
    header {
      background: linear-gradient(135deg, var(--azul) 0%, var(--teal2) 60%, var(--teal) 100%);
      color: #fff; padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; box-shadow: var(--sombra);
    }
    header .logo { display: flex; align-items: center; gap: 12px; }
    header .logo svg { width: 36px; height: 36px; }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .5px; }
    header .badge {
      background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.35);
      border-radius: 20px; padding: 4px 14px; font-size: .8rem; font-weight: 600;
    }

    /* LAYOUT */
    .container { display: flex; height: calc(100vh - 64px); overflow: hidden; }

    /* SIDEBAR */
    aside {
      width: 300px; min-width: 270px; background: var(--branco);
      border-right: 1px solid var(--cinza2);
      display: flex; flex-direction: column; overflow-y: auto;
      box-shadow: 2px 0 8px rgba(0,0,0,.05);
    }
    .sidebar-section { padding: 18px 20px; border-bottom: 1px solid var(--cinza2); }
    .sidebar-section h3 {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--cinza3); margin-bottom: 12px;
    }

    label.field-label { display: block; font-size: .82rem; font-weight: 600; color: #555; margin-bottom: 5px; }
    input[type=text], input[type=email], input[type=password] {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--cinza2);
      border-radius: 8px; font-size: .88rem; outline: none; transition: border .2s;
      background: var(--cinza1);
    }
    input[type=text]:focus, input[type=email]:focus, input[type=password]:focus {
      border-color: var(--teal); background: #fff;
    }
    .field { margin-bottom: 12px; }

    /* Upload */
    .upload-area {
      border: 2px dashed var(--cinza2); border-radius: 10px;
      padding: 18px 12px; text-align: center; cursor: pointer;
      transition: all .2s; position: relative;
    }
    .upload-area:hover, .upload-area.drag { border-color: var(--teal); background: #f0fafa; }
    .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
    .upload-area .icon { font-size: 1.8rem; }
    .upload-area p { font-size: .8rem; color: #888; margin-top: 6px; }
    .upload-area .file-name { font-size: .82rem; color: var(--teal2); font-weight: 600; margin-top: 4px; }

    /* Botões */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 18px; border: none; border-radius: 9px;
      font-size: .88rem; font-weight: 700; cursor: pointer; transition: all .18s;
      width: 100%; text-align: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--teal2), var(--teal));
      color: #fff; box-shadow: 0 3px 10px rgba(0,180,180,.3);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(0,180,180,.4); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-danger { background: var(--vermelho); color: #fff; }
    .btn-danger:hover { background: #c53030; }
    .btn-save { background: var(--azul); color: #fff; margin-top: 4px; }
    .btn-save:hover { background: #152f58; }

    /* MAIN */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* TABS */
    .tabs { display: flex; background: var(--branco); border-bottom: 1px solid var(--cinza2); padding: 0 24px; }
    .tab {
      padding: 14px 22px; font-size: .88rem; font-weight: 600; cursor: pointer;
      border-bottom: 3px solid transparent; color: #888; transition: all .2s;
    }
    .tab.active { color: var(--teal2); border-bottom-color: var(--teal2); }
    .tab:hover:not(.active) { color: var(--texto); }

    /* CONTEÚDO */
    .tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .panel.active { display: flex; }

    /* TABELA EMPRESAS */
    .table-wrap { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: #aaa; gap: 10px;
    }
    .empty-state .icon-big { font-size: 3rem; }
    .empty-state p { font-size: .9rem; }

    table { width: 100%; border-collapse: collapse; background: var(--branco);
            border-radius: 12px; overflow: hidden; box-shadow: var(--sombra); }
    thead { background: linear-gradient(90deg, var(--azul), var(--teal2)); color: #fff; }
    thead th { padding: 13px 16px; text-align: left; font-size: .82rem;
               font-weight: 700; letter-spacing: .4px; }
    tbody tr { border-bottom: 1px solid var(--cinza2); transition: background .15s; cursor: pointer; }
    tbody tr:hover { background: #f0fafa; }
    tbody tr.selecionada { background: #e6f7f7 !important; }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 11px 16px; font-size: .87rem; }
    .badge-email { background: #e0f4f4; color: var(--teal2); padding: 3px 9px;
                   border-radius: 20px; font-size: .75rem; font-weight: 600; }
    .badge-sem { background: #fff3e0; color: var(--laranja); padding: 3px 9px;
                 border-radius: 20px; font-size: .75rem; }

    /* Checkbox customizado */
    .cb-wrap { display: flex; align-items: center; justify-content: center; }
    .cb-wrap input[type=checkbox] { display: none; }
    .cb-box {
      width: 18px; height: 18px; border: 2px solid var(--cinza3); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; background: #fff; flex-shrink: 0;
    }
    .cb-wrap input:checked + .cb-box {
      background: var(--teal2); border-color: var(--teal2);
    }
    .cb-wrap input:checked + .cb-box::after {
      content: ''; display: block; width: 5px; height: 9px;
      border: 2px solid #fff; border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px,-1px);
    }

    /* Barra de ações da tabela */
    .table-actions {
      padding: 10px 24px 0;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    }
    .counter { font-size: .82rem; color: #888; }
    .sel-actions { display: flex; align-items: center; gap: 8px; }
    .btn-sel {
      background: none; border: 1px solid var(--cinza2); color: var(--texto);
      padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: .78rem; font-weight: 600;
      transition: all .15s;
    }
    .btn-sel:hover { background: var(--cinza2); }
    .sel-count { font-size: .82rem; color: var(--teal2); font-weight: 700; }

    /* LOG */
    .log-header {
      padding: 12px 24px; background: var(--branco); border-bottom: 1px solid var(--cinza2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .log-header .status-dot {
      width: 9px; height: 9px; border-radius: 50%; background: var(--cinza3);
      display: inline-block; margin-right: 7px;
    }
    .log-header .status-dot.ativo { background: var(--verde); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .log-header .status-text { font-size: .83rem; font-weight: 600; }
    .btn-clear { background: none; border: 1px solid var(--cinza2); color: #888;
                 padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: .78rem; }
    .btn-clear:hover { background: var(--cinza2); }

    #log-box {
      flex: 1; overflow-y: auto; padding: 16px 24px;
      font-family: 'Consolas','Courier New',monospace; font-size: .82rem;
      line-height: 1.7; background: #1e2430; color: #cdd9e5;
    }
    .log-line { display: block; white-space: pre-wrap; word-break: break-all; }
    .log-ok    { color: #56d364; }
    .log-err   { color: #f85149; }
    .log-warn  { color: #e3b341; }
    .log-info  { color: #79c0ff; }
    .log-sep   { color: #58a6ff; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px; background: #2d3748; color: #fff;
      padding: 12px 20px; border-radius: 10px; font-size: .85rem; box-shadow: var(--sombra);
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; }

    .spinner { display: inline-block; width: 14px; height: 14px;
               border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
               border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar-wrap { height: 4px; background: var(--cinza2); }
    .progress-bar { height: 100%; background: linear-gradient(90deg,var(--teal),var(--azul));
                    width: 0%; transition: width .4s; }

  </style>
</head>
<body>

<header>
  <div class="logo">
    <!-- Ícone losango Tesserato -->
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 3 L33 18 L18 33 L3 18 Z" stroke="white" stroke-width="2.5" fill="none"/>
      <path d="M18 9 L27 18 L18 27 L9 18 Z" stroke="rgba(255,255,255,.55)" stroke-width="1.5" fill="none"/>
    </svg>
    <h1>Tesserato — Bot DAS-SIMEI</h1>
  </div>
  <div class="badge" id="badge-competencia">Carregando...</div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside>

    <!-- Upload da planilha -->
    <div class="sidebar-section">
      <h3>📊 Planilha de Empresas</h3>
      <div class="upload-area" id="upload-area">
        <input type="file" id="file-input" accept=".xlsx,.xlsm,.csv"/>
        <div class="icon">📁</div>
        <p>Clique ou arraste o arquivo<br><strong>.xlsx</strong> ou <strong>.csv</strong></p>
        <div class="file-name" id="file-name"></div>
      </div>
    </div>

    <!-- Pasta de downloads -->
    <div class="sidebar-section">
      <h3>📂 Pasta de Downloads</h3>
      <div class="field">
        <input type="text" id="pasta-downloads" placeholder="C:\DAS" />
      </div>
    </div>

    <!-- Configurações de email -->
    <div class="sidebar-section">
      <h3>✉️ Configurações de Email</h3>
      <div class="field">
        <label class="field-label">Remetente (Gmail)</label>
        <input type="email" id="email-remetente" placeholder="seuemail@gmail.com"/>
      </div>
      <div class="field">
        <label class="field-label">Senha de App</label>
        <input type="password" id="email-senha" placeholder="xxxx xxxx xxxx xxxx"/>
      </div>
      <div class="field">
        <label class="field-label">Email padrão (destinatário)</label>
        <input type="email" id="email-destino" placeholder="destino@email.com"/>
      </div>
      <button class="btn btn-save" onclick="salvarConfig()">💾 Salvar Configurações</button>
    </div>

    <!-- Ações -->
    <div class="sidebar-section" style="margin-top:auto; border-bottom:none;">
      <button class="btn btn-primary" id="btn-iniciar" onclick="iniciarBot()" disabled>
        ▶ Iniciar Processo
      </button>
      <div style="margin-top:8px;">
        <button class="btn btn-danger" id="btn-parar" onclick="pararBot()" disabled style="opacity:.5">
          ⏹ Parar
        </button>
      </div>
    </div>

  </aside>

  <!-- MAIN -->
  <main>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>

    <div class="tabs">
      <div class="tab active" onclick="mudarTab('empresas', this)">🏢 Empresas</div>
      <div class="tab" onclick="mudarTab('log', this)">📋 Log do Processo</div>
    </div>

    <div class="tab-content">

      <!-- PAINEL EMPRESAS -->
      <div class="panel active" id="panel-empresas">
        <div class="table-actions">
          <span class="counter" id="counter"></span>
          <div class="sel-actions" id="sel-actions" style="display:none">
            <button class="btn-sel" onclick="selecionarTodas()">✅ Todas</button>
            <button class="btn-sel" onclick="deselecionarTodas()">☐ Nenhuma</button>
            <button class="btn-sel" onclick="inverterSelecao()">🔄 Inverter</button>
            <span class="sel-count" id="sel-count"></span>
          </div>
        </div>
        <div class="table-wrap" id="table-wrap">
          <div class="empty-state">
            <div class="icon-big">📂</div>
            <p>Nenhuma planilha carregada.</p>
            <p>Faça upload do arquivo <strong>.xlsx</strong> ou <strong>.csv</strong> na barra lateral.</p>
          </div>
        </div>
      </div>

      <!-- PAINEL LOG -->
      <div class="panel" id="panel-log">
        <div class="log-header">
          <div>
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-text">Aguardando início...</span>
          </div>
          <button class="btn-clear" onclick="limparLog()">🗑 Limpar</button>
        </div>
        <div id="log-box"></div>
      </div>

    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  let empresasCarregadas = [];
  let evtSource = null;

  // ── Competência ──────────────────────────────────────────────────────────
  (function() {
    const d = new Date();
    const mes = d.getMonth() === 0 ? 12 : d.getMonth();
    const ano = d.getMonth() === 0 ? d.getFullYear()-1 : d.getFullYear();
    const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    document.getElementById('badge-competencia').textContent =
      `Competência: ${meses[mes-1]}/${ano}`;
  })();

  // ── Config ───────────────────────────────────────────────────────────────
  async function carregarConfig() {
    const r = await fetch('/config');
    const c = await r.json();
    document.getElementById('pasta-downloads').value  = c.pasta_downloads || '';
    document.getElementById('email-remetente').value  = c.email_remetente || '';
    document.getElementById('email-senha').value      = c.email_senha     || '';
    document.getElementById('email-destino').value    = c.email_destino   || '';
  }

  async function salvarConfig() {
    const cfg = {
      pasta_downloads: document.getElementById('pasta-downloads').value,
      email_remetente: document.getElementById('email-remetente').value,
      email_senha:     document.getElementById('email-senha').value,
      email_destino:   document.getElementById('email-destino').value,
    };
    await fetch('/config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(cfg) });
    toast('✅ Configurações salvas!');
  }

  // ── Upload planilha ──────────────────────────────────────────────────────
  const fileInput = document.getElementById('file-input');
  const uploadArea = document.getElementById('upload-area');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) uploadPlanilha(fileInput.files[0]);
  });
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault(); uploadArea.classList.remove('drag');
    if (e.dataTransfer.files[0]) uploadPlanilha(e.dataTransfer.files[0]);
  });

  async function uploadPlanilha(file) {
    document.getElementById('file-name').textContent = '⏳ Carregando...';
    const fd = new FormData();
    fd.append('planilha', file);
    const r = await fetch('/upload', { method:'POST', body:fd });
    const dados = await r.json();
    if (dados.erro) { toast('❌ ' + dados.erro, true); document.getElementById('file-name').textContent=''; return; }
    empresasCarregadas = dados.empresas;
    document.getElementById('file-name').textContent = `✓ ${file.name}`;
    renderTabela(dados.empresas);
    toast(`✅ ${dados.total} empresa(s) carregada(s).`);
  }

  // ── Tabela ───────────────────────────────────────────────────────────────
  function renderTabela(empresas) {
    const wrap = document.getElementById('table-wrap');
    if (!empresas.length) {
      wrap.innerHTML = '<div class="empty-state"><div class="icon-big">😕</div><p>Nenhuma empresa encontrada na planilha.</p></div>';
      document.getElementById('counter').textContent = '';
      document.getElementById('sel-actions').style.display = 'none';
      return;
    }

    let html = `<table>
      <thead><tr>
        <th style="width:44px">
          <div class="cb-wrap" onclick="toggleTodas(event)">
            <input type="checkbox" id="cb-all"/>
            <div class="cb-box"></div>
          </div>
        </th>
        <th>#</th><th>CNPJ</th><th>Nome / Razão Social</th><th>Email</th>
      </tr></thead><tbody>`;

    empresas.forEach((e, i) => {
      const emailBadge = e.email
        ? `<span class="badge-email">✉ ${e.email}</span>`
        : `<span class="badge-sem">Padrão</span>`;
      html += `<tr onclick="toggleLinha(this, ${i})" data-idx="${i}">
        <td onclick="event.stopPropagation(); toggleLinha(this.parentElement, ${i})">
          <div class="cb-wrap">
            <input type="checkbox" class="cb-empresa" data-idx="${i}"/>
            <div class="cb-box"></div>
          </div>
        </td>
        <td style="color:#aaa;font-size:.78rem">${i+1}</td>
        <td><strong>${formatCnpj(e.cnpj)}</strong></td>
        <td>${e.nome || '—'}</td>
        <td>${emailBadge}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;

    // Seleciona todas por padrão
    selecionarTodas();
    document.getElementById('sel-actions').style.display = 'flex';
    atualizarCounter();
  }

  function toggleLinha(tr, idx) {
    const cb = tr.querySelector('.cb-empresa');
    cb.checked = !cb.checked;
    tr.classList.toggle('selecionada', cb.checked);
    atualizarCounter();
    atualizarCbAll();
  }

  function toggleTodas(e) {
    e.stopPropagation();
    const cbAll = document.getElementById('cb-all');
    cbAll.checked = !cbAll.checked;
    cbAll.checked ? selecionarTodas() : deselecionarTodas();
  }

  function selecionarTodas() {
    document.querySelectorAll('.cb-empresa').forEach(cb => {
      cb.checked = true;
      cb.closest('tr').classList.add('selecionada');
    });
    const cbAll = document.getElementById('cb-all');
    if (cbAll) cbAll.checked = true;
    atualizarCounter();
  }

  function deselecionarTodas() {
    document.querySelectorAll('.cb-empresa').forEach(cb => {
      cb.checked = false;
      cb.closest('tr').classList.remove('selecionada');
    });
    const cbAll = document.getElementById('cb-all');
    if (cbAll) cbAll.checked = false;
    atualizarCounter();
  }

  function inverterSelecao() {
    document.querySelectorAll('.cb-empresa').forEach(cb => {
      cb.checked = !cb.checked;
      cb.closest('tr').classList.toggle('selecionada', cb.checked);
    });
    atualizarCounter();
    atualizarCbAll();
  }

  function atualizarCbAll() {
    const todos = document.querySelectorAll('.cb-empresa');
    const marcados = document.querySelectorAll('.cb-empresa:checked');
    const cbAll = document.getElementById('cb-all');
    if (cbAll) cbAll.checked = todos.length > 0 && marcados.length === todos.length;
  }

  function atualizarCounter() {
    const total    = empresasCarregadas.length;
    const marcados = document.querySelectorAll('.cb-empresa:checked').length;
    document.getElementById('counter').textContent  = `${total} empresa(s) carregada(s)`;
    document.getElementById('sel-count').textContent = `${marcados} selecionada(s)`;
    document.getElementById('btn-iniciar').disabled = marcados === 0;
  }

  function getSelecionadas() {
    return Array.from(document.querySelectorAll('.cb-empresa:checked'))
      .map(cb => empresasCarregadas[parseInt(cb.dataset.idx)]);
  }

  function formatCnpj(c) {
    c = c.replace(/\D/g,'');
    if (c.length===14) return c.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
    return c;
  }

  // ── Bot ──────────────────────────────────────────────────────────────────
  async function iniciarBot() {
    const selecionadas = getSelecionadas();
    if (!selecionadas.length) { toast('❌ Selecione ao menos uma empresa.', true); return; }
    mudarTab('log', document.querySelectorAll('.tab')[1]);
    setStatus(true);

    const pasta = document.getElementById('pasta-downloads').value;
    const r = await fetch('/iniciar', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ empresas: selecionadas, pasta_downloads: pasta })
    });
    const d = await r.json();
    if (d.erro) { toast('❌ ' + d.erro, true); setStatus(false); return; }
    iniciarSSE();
    animarProgress();
  }

  async function pararBot() {
    await fetch('/parar', { method:'POST' });
    toast('⏹ Solicitação de parada enviada.');
  }

  function iniciarSSE() {
    if (evtSource) { evtSource.close(); }
    evtSource = new EventSource('/log-stream');
    evtSource.onmessage = e => {
      if (e.data === '__PING__') return;
      if (e.data === '__FIM__') {
        setStatus(false);
        evtSource.close();
        document.getElementById('progress-bar').style.width = '100%';
        setTimeout(() => document.getElementById('progress-bar').style.width='0%', 2000);
        return;
      }
      appendLog(e.data);
    };
  }


  function appendLog(msg) {
    const box = document.getElementById('log-box');
    const span = document.createElement('span');
    span.className = 'log-line ' + classLog(msg);
    span.textContent = msg;
    box.appendChild(span);
    box.appendChild(document.createTextNode('\n'));
    box.scrollTop = box.scrollHeight;
  }

  function classLog(msg) {
    if (msg.includes('✓') || msg.includes('sucesso') || msg.includes('Concluído')) return 'log-ok';
    if (msg.includes('✗') || msg.includes('Falha') || msg.includes('Erro') || msg.includes('não encontrado')) return 'log-err';
    if (msg.includes('!') || msg.includes('⚠') || msg.includes('⏳')) return 'log-warn';
    if (msg.includes('===') || msg.includes('Bot DAS') || msg.includes('Processando')) return 'log-sep';
    return 'log-info';
  }

  function limparLog() {
    document.getElementById('log-box').innerHTML = '';
  }

  let progressInterval = null;
  function animarProgress() {
    let p = 0;
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (p < 85) { p += Math.random()*2; document.getElementById('progress-bar').style.width = p+'%'; }
    }, 600);
  }

  function setStatus(ativo) {
    document.getElementById('status-dot').className  = 'status-dot' + (ativo ? ' ativo' : '');
    document.getElementById('status-text').textContent = ativo ? 'Processando...' : 'Aguardando início...';
    document.getElementById('btn-iniciar').disabled = ativo;
    document.getElementById('btn-parar').disabled   = !ativo;
    document.getElementById('btn-parar').style.opacity = ativo ? '1' : '.5';
    if (!ativo) clearInterval(progressInterval);
  }

  // ── Tabs ─────────────────────────────────────────────────────────────────
  function mudarTab(nome, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + nome).classList.add('active');
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, erro=false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = erro ? '#c53030' : '#2d3748';
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  carregarConfig();
</script>
</body>
</html>
